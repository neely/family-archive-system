# .github/workflows/deploy.yml
#
# Runs on every push to main in the PRIVATE repo.
#
# Steps:
#   1. Check out the private repo
#   2. Run build.js to sanitize living people's private fields
#   3. Check out the PUBLIC repo
#   4. Copy sanitized JSON and images into the public repo
#   5. Commit and push if anything changed
#
# Required secret (set in private repo Settings → Secrets → Actions):
#   PUBLIC_REPO_TOKEN  — GitHub Personal Access Token with `repo` scope
#                        on the PUBLIC repo. Generate at:
#                        github.com → Settings → Developer settings →
#                        Personal access tokens → Tokens (classic) → Generate new token
#                        Scopes needed: repo (full)
#
# Required variables (set in private repo Settings → Variables → Actions):
#   PUBLIC_REPO_OWNER  — your GitHub username, e.g. "benjaminvoss"
#   PUBLIC_REPO_NAME   — public repo name, e.g. "family-archive"

name: Build and Deploy to Public Archive

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # also allows manual trigger from GitHub Actions UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Check out private repo ─────────────────────────────────────
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          path: private

      # ── Step 2: Set up Node and run build script ────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build script
        run: |
          cd private
          node build.js

      # ── Step 3: Check out public repo ──────────────────────────────────────
      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PUBLIC_REPO_OWNER }}/${{ vars.PUBLIC_REPO_NAME }}
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public

      # ── Step 4: Copy outputs into public repo ──────────────────────────────
      - name: Copy sanitized JSON to public repo
        run: |
          cp private/dist/family-archive.json public/family-archive.json

      - name: Sync images to public repo
        run: |
          # Only runs if images/ directory exists in private repo
          if [ -d "private/images" ]; then
            mkdir -p public/images
            # rsync: copies new files, skips existing identical files
            # --checksum is used instead of timestamps (more reliable in CI)
            rsync -av --checksum private/images/ public/images/
          else
            echo "No images/ directory found, skipping image sync"
          fi

      # ── Step 5: Commit and push if anything changed ─────────────────────────
      - name: Commit and push to public repo
        run: |
          cd public
          git config user.name  "Archive Build Bot"
          git config user.email "actions@github.com"

          git add family-archive.json
          git add images/ 2>/dev/null || true   # don't fail if images/ doesn't exist yet

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to deploy — public repo is already up to date"
          else
            # Include the private repo commit SHA in the message for traceability
            PRIVATE_SHA=$(cd ../private && git rev-parse --short HEAD)
            git commit -m "Deploy from private repo @ ${PRIVATE_SHA}" \
                       -m "Auto-generated by build.js. Living people's private fields redacted." \
                       -m "Do not edit this repo directly — edit family-archive-full.json in the private repo."
            git push
            echo "✓ Deployed to public repo"
          fi
